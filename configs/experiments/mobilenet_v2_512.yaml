# lightning.pytorch==2.x
seed_everything: 42
trainer:
  accelerator: auto
  devices: auto
  gradient_clip_val: 1.0
  precision: 16-mixed
  max_epochs: 50
  log_every_n_steps: 25
  logger:
    - class_path: lightning.pytorch.loggers.WandbLogger
      init_args:
        project: jute-disease-detection
        entity: grade-descent
        name: mobilenet_v2_512px
        log_model: true
    - class_path: lightning.pytorch.loggers.CSVLogger
      init_args:
        save_dir: artifacts/logs/resolution_exps
        name: mobilenet_v2_512px
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: epoch
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: val_loss
        dirpath: artifacts/checkpoints/mobilenet_v2_512
        filename: "mobilenet_v2-512-{epoch:02d}-{val_loss:.4f}"
        save_top_k: 1
        mode: min
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val_loss
        patience: 5
        mode: min
    - class_path: lightning.pytorch.callbacks.TQDMProgressBar
      init_args:
        refresh_rate: 50

model:
  num_classes: 6
  lr: 0.001
  freeze_backbone: true
  feature_extractor:
    class_path: jute_disease.models.dl.backbone.TimmBackbone
    init_args:
      model_name: mobilenetv2_100
      pretrained: true
      drop_rate: 0.1

data:
  data_dir: data/ml_split
  batch_size: 32
  use_weighted_sampler: true
  k_fold: 1
  image_size: 512

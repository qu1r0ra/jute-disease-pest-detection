# lightning.pytorch==2.x
seed_everything: 42
trainer:
  accelerator: auto
  devices: auto
  precision: 16-mixed
  max_epochs: 100
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: jute-disease-detection
      entity: grade-descent
      name: vgg
      log_model: true
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: epoch
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: val_loss
        dirpath: artifacts/checkpoints/vgg
        filename: "vgg-{epoch:02d}-{val_loss:.4f}"
        save_top_k: 1
        mode: min
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val_loss
        patience: 5
        mode: min

model:
  num_classes: 6
  lr: 0.001
  freeze_backbone: true
  feature_extractor:
    class_path: jute_disease.models.dl.backbone.TimmBackbone
    init_args:
      model_name: vgg16
      pretrained: true
      out_features: 4096  # vgg16 num_features reports 512 but actual output is 4096

data:
  data_dir: data/ml_split
  batch_size: 32
  use_weighted_sampler: true
  k_fold: 1
